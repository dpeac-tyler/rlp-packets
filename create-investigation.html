      <h1 class="page-title page-title--underlined">Create Investigation</h1>

      <div class="margin-top-2">
        <p>Create a new investigation for case <strong id="page-case-number"></strong>.</p>
      </div>

      <div class="grid-row grid-gap-4" style="margin-top: 2rem;">
        <div class="tablet:grid-col-4">
          <div class="text-bold">Investigation ID</div>
          <div id="investigation-id-display">—</div>
        </div>
      </div>

      <div style="margin-top: 3rem;">
        <label class="usa-label" for="investigation-title">Investigation Title <span class="field-required">Required</span></label>
        <input class="usa-input" id="investigation-title" name="investigation-title" type="text" required style="max-width: 100%;">
      </div>

      <div class="grid-row grid-gap-4" style="margin-top: 3rem;">
        <div class="tablet:grid-col-6">
          <label class="usa-label" for="investigation-status">Investigation Status</label>
          <select class="usa-select" id="investigation-status" name="investigation-status">
            <option value="Open" selected>Open</option>
            <option value="In Progress">In Progress</option>
            <option value="On Hold">On Hold</option>
            <option value="Completed">Completed</option>
            <option value="Closed (No Violations)">Closed (No Violations)</option>
          </select>
        </div>
        <div class="tablet:grid-col-6">
          <label class="usa-label" for="investigation-type">Investigation Type</label>
          <select class="usa-select" id="investigation-type" name="investigation-type">
            <option value="Complaint Investigation" selected>Complaint Investigation</option>
            <option value="Follow-up Investigation">Follow-up Investigation</option>
            <option value="Proactive Investigation">Proactive Investigation</option>
            <option value="Referral Investigation">Referral Investigation</option>
          </select>
        </div>
      </div>

      <div class="grid-row grid-gap-4" style="margin-top: 3rem;">
        <div class="tablet:grid-col-6">
          <label class="usa-label" for="investigation-priority">Priority</label>
          <select class="usa-select" id="investigation-priority" name="investigation-priority">
            <option value="High">High</option>
            <option value="Medium" selected>Medium</option>
            <option value="Low">Low</option>
          </select>
        </div>
        <div class="tablet:grid-col-6">
          <label class="usa-label" for="assigned-investigator">Assigned Investigator <span class="field-required">Required</span></label>
          <select class="usa-select" id="assigned-investigator" name="assigned-investigator" required>
            <option value="" selected>Please Select</option>
            <option value="Harris, Calvin">Harris, Calvin</option>
            <option value="Martinez, Elena">Martinez, Elena</option>
            <option value="Thompson, Robert">Thompson, Robert</option>
            <option value="Williams, Dana">Williams, Dana</option>
            <option value="Nguyen, Kevin">Nguyen, Kevin</option>
          </select>
        </div>
      </div>

      <div class="grid-row grid-gap-4" style="margin-top: 3rem;">
        <div class="tablet:grid-col-4">
          <label class="usa-label" for="start-date">Start Date</label>
          <input class="usa-input" id="start-date" name="start-date" type="date">
        </div>
        <div class="tablet:grid-col-4">
          <label class="usa-label" for="target-completion-date">Target Completion Date <span class="field-required">Required</span></label>
          <input class="usa-input" id="target-completion-date" name="target-completion-date" type="date" required>
        </div>
        <div class="tablet:grid-col-4">
          <label class="usa-label" for="completion-date">Completion Date</label>
          <input class="usa-input" id="completion-date" name="completion-date" type="date">
        </div>
      </div>

      <div style="margin-top: 3rem;">
        <label class="usa-label" for="investigation-notes">Investigation Notes</label>
        <textarea class="usa-textarea" id="investigation-notes" name="investigation-notes" maxlength="1000" style="max-width: 100%; height: 10rem;"></textarea>
        <div id="notes-char-count" style="font-size: 16px; color: #71767a; margin-top: 0.25rem;">1000 characters left</div>
      </div>

      <div style="margin-top: 2rem;">
        <button type="button" class="usa-button" id="create-investigation-btn">Create Investigation</button>
        <button type="button" class="usa-button usa-button--outline" id="cancel-investigation-btn">Cancel</button>
      </div>

    </main>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const caseNumber = params.get('case') || '';

    // Breadcrumb
    const caseLink = document.getElementById('breadcrumb-case-link');
    caseLink.textContent = caseNumber;
    caseLink.href = 'view-case-detail.html?case=' + encodeURIComponent(caseNumber);

    // Page paragraph
    document.getElementById('page-case-number').textContent = caseNumber;

    // Generate Investigation ID
    const year = new Date().getFullYear();
    let counter = parseInt(sessionStorage.getItem('investigationCounter') || '0', 10);
    counter++;
    sessionStorage.setItem('investigationCounter', counter);
    const investigationId = 'I-' + year + '-' + String(counter).padStart(4, '0');
    document.getElementById('investigation-id-display').textContent = investigationId;

    document.getElementById('investigation-notes').addEventListener('input', function() {
      document.getElementById('notes-char-count').textContent = (1000 - this.value.length) + ' characters left';
    });

    document.getElementById('create-investigation-btn').addEventListener('click', () => {
      const title = document.getElementById('investigation-title').value.trim();
      const targetDate = document.getElementById('target-completion-date').value;

      if (!title) {
        document.getElementById('investigation-title').focus();
        return;
      }
      if (!targetDate) {
        document.getElementById('target-completion-date').focus();
        return;
      }
      const assignedTo = document.getElementById('assigned-investigator').value;
      if (!assignedTo) {
        document.getElementById('assigned-investigator').focus();
        return;
      }

      const investigation = {
        id: investigationId,
        title,
        status: document.getElementById('investigation-status').value,
        type: document.getElementById('investigation-type').value,
        priority: document.getElementById('investigation-priority').value,
        assignedTo,
        startDate: document.getElementById('start-date').value,
        targetCompletionDate: targetDate,
        completionDate: document.getElementById('completion-date').value,
        notes: document.getElementById('investigation-notes').value
      };

      const key = 'investigations_' + caseNumber;
      const existing = JSON.parse(sessionStorage.getItem(key) || '[]');
      existing.push(investigation);
      sessionStorage.setItem(key, JSON.stringify(existing));

      window.location.href = 'view-case-detail.html?case=' + encodeURIComponent(caseNumber) + '&tab=investigations';
    });

    document.getElementById('cancel-investigation-btn').addEventListener('click', () => {
      window.location.href = 'view-case-detail.html?case=' + encodeURIComponent(caseNumber);
    });
  </script>
